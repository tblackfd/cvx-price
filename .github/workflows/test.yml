name: CVX Dividend Test

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      SOURCE_URL: https://chevroncorp.gcs-web.com/stock-information/dividend-history
      OUT_JSON: cvx_latest_dividend.json
      OUT_CSV: cvx_dividend_history.csv

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml

      - name: Scrape latest CVX dividend
        run: |
          cat > scrape_dividend.py <<'EOF'
          import os
          import re
          import io
          import json
          import time
          import hashlib
          from datetime import datetime, timezone

          import requests
          import pandas as pd

          SOURCE_URL = os.environ["SOURCE_URL"]
          OUT_JSON = os.environ["OUT_JSON"]
          OUT_CSV = os.environ["OUT_CSV"]

          def fetch_with_retries(url, attempts=6, backoff=2.0):
              headers = {
                  "User-Agent": "github-actions-cvx-dividend-scraper/1.0",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              }
              last_exc = None
              for i in range(1, attempts + 1):
                  try:
                      return requests.get(url, headers=headers, timeout=30)
                  except Exception as e:
                      last_exc = e
                      time.sleep(backoff * i)
              raise RuntimeError(f"Failed to fetch {url}: {last_exc}")

          resp = fetch_with_retries(SOURCE_URL)
          html = resp.text or ""

          tables = pd.read_html(io.StringIO(html))
          df = tables[0].dropna(how="all")

          amount_re = re.compile(r"\$?\s*\d+(\.\d+)?")
          date_re = re.compile(r"\d{1,2}/\d{1,2}/\d{2,4}")

          rows = []
          for _, r in df.iterrows():
              if amount_re.match(str(r.iloc[3])) and date_re.match(str(r.iloc[0])):
                  rows.append(r)

          latest = rows[0]

          out = {
              "ticker": "CVX",
              "declared_date": latest.iloc[0],
              "record_date": latest.iloc[1],
              "payable_date": latest.iloc[2],
              "amount_per_share": float(
                  str(latest.iloc[3]).replace("$", "").strip()
              ),
              "currency": "USD",
          }

          with open(OUT_JSON, "w") as f:
              json.dump(out, f, indent=2)

          df.to_csv(OUT_CSV, index=False)

          print(json.dumps(out, indent=2))
          EOF

          python scrape_dividend.py
