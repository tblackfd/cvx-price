name: Fetch CVX Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CVX + AUD/USD data
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs    = require('fs');

          const UA = 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';

          function getText(url, extraHeaders = {}) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': UA, ...extraHeaders } }, res => {
                if (res.statusCode && res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return resolve(getText(res.headers.location, extraHeaders));
                }
                if (!res.statusCode || res.statusCode < 200 || res.statusCode >= 300) {
                  return reject(new Error(`HTTP ${res.statusCode || 'unknown'} for ${url}`));
                }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          async function getJson(url) {
            const data = await getText(url);
            try {
              return JSON.parse(data);
            } catch (e) {
              throw new Error('JSON parse error: ' + data.slice(0, 200));
            }
          }

          async function main() {
            const key  = process.env.FINNHUB_KEY;
            const now  = Math.floor(Date.now() / 1000);
            const from = now - 10 * 365 * 24 * 60 * 60; // 10 years
            
            function parseStooqCsv(csv) {
              const lines = csv.trim().split(/\r?\n/).filter(Boolean);
              if (!lines.length || !/^Date,Open,High,Low,Close,Volume$/i.test(lines[0].trim())) {
                return null;
              }
              const t = [];
              const c = [];
              // Stooq CSV columns: Date,Open,High,Low,Close,Volume
              for (const row of lines.slice(1)) {
                const cols = row.split(',');
                const date = cols[0];
                const closeNum = Number(cols[4]);
                if (!date || !Number.isFinite(closeNum)) continue;
                // Parse YYYY-MM-DD date string directly to avoid timezone offsets
                const [y, m, d] = date.split('-');
                const ts = Date.UTC(Number(y), Number(m) - 1, Number(d)) / 1000;
                t.push(ts);
                c.push(closeNum);
              }
              return t.length ? { t, c } : null;
            }

            async function getYahooCandles(host = 'query1') {
              const yahoo = await getJson(
                `https://${host}.finance.yahoo.com/v8/finance/chart/CVX?period1=${from}&period2=${now}&interval=1d&events=history`
              );
              const result = yahoo?.chart?.result?.[0];
              const ts = result?.timestamp;
              const closes = result?.indicators?.quote?.[0]?.close;
              if (!Array.isArray(ts) || !Array.isArray(closes)) return null;
              const t = [];
              const c = [];
              for (let i = 0; i < ts.length; i++) {
                const time = Number(ts[i]);
                const closeNum = Number(closes[i]);
                if (!Number.isFinite(time) || !Number.isFinite(closeNum)) continue;
                t.push(time);
                c.push(closeNum);
              }
              return t.length ? { t, c } : null;
            }

            // --- CVX historical candles from Stooq → Yahoo Finance ---
            console.log('Fetching CVX historical candles...');
            let stock = null;

            try {
              const csv = await getText('https://stooq.pl/q/d/l/?s=CVX.US&i=d');
              stock = parseStooqCsv(csv);
              if (stock) {
                console.log(`Got ${stock.t.length} candles from Stooq`);
              } else {
                console.warn(`Stooq returned unusable CSV (first 100 chars: ${csv.slice(0, 100).replace(/\r?\n/g, ' ')}); trying Yahoo Finance`);
              }
            } catch (e) {
              console.warn(`Stooq request failed (${e.message}); trying Yahoo Finance`);
            }

            if (!stock) {
              try {
                stock = await getYahooCandles('query1');
                if (stock) console.log(`Got ${stock.t.length} candles from Yahoo Finance (query1)`);
              } catch (e) {
                console.warn(`Yahoo Finance query1 failed (${e.message}); trying query2`);
              }
            }

            if (!stock) {
              try {
                stock = await getYahooCandles('query2');
                if (stock) console.log(`Got ${stock.t.length} candles from Yahoo Finance (query2)`);
              } catch (e) {
                console.warn(`Yahoo Finance query2 failed (${e.message})`);
              }
            }

            if (!stock) throw new Error('No source returned CVX historical candle data');

            // --- Finnhub current quote (free tier: /quote endpoint) ---
            let finnhubQuote = null;
            if (key) {
              try {
                const quote = await getJson(
                  `https://finnhub.io/api/v1/quote?symbol=CVX&token=${key}`
                );
                // quote.c = current price, quote.t = timestamp (Unix seconds)
                const price = Number(quote?.c);
                const ts    = Number(quote?.t);
                if (Number.isFinite(price) && price > 0 && Number.isFinite(ts) && ts > 0) {
                  finnhubQuote = { price, ts };
                  console.log(`Got current quote from Finnhub: $${price} at ${new Date(ts * 1000).toISOString()}`);
                } else {
                  console.warn('Finnhub quote response missing valid price/timestamp:', JSON.stringify(quote).slice(0, 200));
                }
              } catch (e) {
                console.warn(`Finnhub quote request failed (${e.message}); skipping`);
              }
            } else {
              console.warn('FINNHUB_KEY is not set; skipping Finnhub current quote');
            }

            // --- AUD/USD history from Frankfurter ---
            console.log('Fetching AUD/USD rates...');
            const today = new Date().toISOString().slice(0, 10);
            const fx = await getJson(
              `https://api.frankfurter.app/v1/1999-01-04..${today}?from=USD&to=AUD`
            );
            if (!fx.rates) throw new Error('Frankfurter error: no rates');
            console.log(`Got ${Object.keys(fx.rates).length} FX dates`);

            // --- Build merged data array ---
            const fxDates = Object.keys(fx.rates).sort();

            function nearestFX(isoDate) {
              if (fx.rates[isoDate]) return fx.rates[isoDate].AUD;
              const prev = fxDates.filter(d => d <= isoDate);
              return prev.length ? fx.rates[prev[prev.length - 1]].AUD : null;
            }

            const merged = stock.t.map((ts, i) => {
              const date    = new Date(ts * 1000).toISOString().slice(0, 10);
              const usd     = stock.c[i];
              const audPerUsd = nearestFX(date);
              const aud     = audPerUsd ? usd * audPerUsd : null;
              const fx_rate = audPerUsd ? 1 / audPerUsd : null;
              return { date, usd, aud, fx: fx_rate };
            }).filter(d => d.aud !== null && d.usd !== null);

            // --- Upsert Finnhub current quote as today's record ---
            if (finnhubQuote) {
              const quoteDate = new Date(finnhubQuote.ts * 1000).toISOString().slice(0, 10);
              const audPerUsd = nearestFX(quoteDate);
              const aud       = audPerUsd ? finnhubQuote.price * audPerUsd : null;
              const fx_rate   = audPerUsd ? 1 / audPerUsd : null;
              const record    = { date: quoteDate, usd: finnhubQuote.price, aud, fx: fx_rate, source: 'finnhub' };
              const idx = merged.findIndex(d => d.date === quoteDate);
              if (idx >= 0) {
                merged[idx] = record;
                console.log(`Updated existing record for ${quoteDate} with Finnhub quote`);
              } else {
                merged.push(record);
                merged.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
                console.log(`Appended new record for ${quoteDate} from Finnhub quote`);
              }
            }

            const output = {
              updated: new Date().toISOString(),
              data: merged,
            };

            fs.writeFileSync('data.json', JSON.stringify(output));
            console.log(`Wrote ${merged.length} rows to data.json`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
