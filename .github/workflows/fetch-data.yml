name: Update CVX Data

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Merge baseline CSV with latest daily rows (Stooq)
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const BASELINE_CSV = path.resolve('cvx_us_d.csv');
          const OUTPUT_JSON = path.resolve('data.json');
          const SYMBOL = 'cvx.us';
          const HOSTS = ['https://stooq.com', 'https://stooq.pl'];
          const REQUEST_TIMEOUT_MS = 30000;

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          function csvEscape(value) {
            const text = String(value ?? '');
            if (/[",\n]/.test(text)) return `"${text.replaceAll('"', '""')}"`;
            return text;
          }

          function parseNumber(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : null;
          }

          function parseCsv(text) {
            const lines = text
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(Boolean);
            if (lines.length < 2) return [];

            const header = lines[0].split(',');
            const idx = {
              date: header.indexOf('Date'),
              open: header.indexOf('Open'),
              high: header.indexOf('High'),
              low: header.indexOf('Low'),
              close: header.indexOf('Close'),
              volume: header.indexOf('Volume')
            };

            if (Object.values(idx).some(i => i < 0)) {
              throw new Error('CSV is missing expected columns: Date,Open,High,Low,Close,Volume');
            }

            const rows = [];
            for (const line of lines.slice(1)) {
              const cols = line.split(',');
              const date = cols[idx.date];
              const open = parseNumber(cols[idx.open]);
              const high = parseNumber(cols[idx.high]);
              const low = parseNumber(cols[idx.low]);
              const close = parseNumber(cols[idx.close]);
              const volume = parseNumber(cols[idx.volume]);

              if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
              if (![open, high, low, close].every(v => Number.isFinite(v) && v > 0)) continue;
              if (!Number.isFinite(volume) || volume < 0) continue;

              rows.push({ date, open, high, low, close, volume });
            }

            return rows;
          }

          function toCsv(rows) {
            const header = 'Date,Open,High,Low,Close,Volume';
            const body = rows.map(row => ([
              row.date,
              row.open,
              row.high,
              row.low,
              row.close,
              row.volume
            ].map(csvEscape).join(',')));
            return `${[header, ...body].join('\n')}\n`;
          }

          function requestText(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, {
                headers: {
                  'User-Agent': 'cvx-price-updater/1.0',
                  'Accept': 'text/csv,*/*;q=0.8'
                }
              }, res => {
                let raw = '';
                res.on('data', chunk => { raw += chunk; });
                res.on('end', () => {
                  if (!res.statusCode || res.statusCode < 200 || res.statusCode >= 300) {
                    reject(new Error(`HTTP ${res.statusCode || 'unknown'}`));
                    return;
                  }
                  resolve(raw);
                });
              });
              req.setTimeout(REQUEST_TIMEOUT_MS, () => req.destroy(new Error('Request timeout')));
              req.on('error', reject);
            });
          }

          async function fetchLatestRows() {
            let lastError = null;
            for (const host of HOSTS) {
              const url = `${host}/q/d/l/?s=${SYMBOL}&i=d`;
              try {
                for (let attempt = 1; attempt <= 3; attempt++) {
                  try {
                    const text = await requestText(url);
                    const rows = parseCsv(text);
                    if (rows.length === 0) throw new Error('No valid rows returned');
                    return { rows, url };
                  } catch (err) {
                    lastError = err;
                    if (attempt < 3) await sleep(1000 * attempt);
                  }
                }
              } catch (err) {
                lastError = err;
              }
            }
            throw new Error(`Failed to fetch latest rows from Stooq: ${lastError?.message || 'unknown error'}`);
          }

          async function main() {
            if (!fs.existsSync(BASELINE_CSV)) {
              throw new Error('Missing baseline file cvx_us_d.csv');
            }

            const baselineRows = parseCsv(fs.readFileSync(BASELINE_CSV, 'utf8'));
            if (baselineRows.length === 0) {
              throw new Error('Baseline CSV has no valid rows');
            }

            console.log(`Baseline rows: ${baselineRows.length}`);

            let latestRows = [];
            let sourceUrl = null;
            try {
              const fetched = await fetchLatestRows();
              latestRows = fetched.rows;
              sourceUrl = fetched.url;
              console.log(`Fetched latest rows: ${latestRows.length} (${sourceUrl})`);
            } catch (err) {
              console.warn(`Latest fetch failed, keeping baseline data only: ${err.message}`);
            }

            const map = new Map();
            for (const row of baselineRows) map.set(row.date, row);
            for (const row of latestRows) map.set(row.date, row);

            const merged = Array.from(map.values()).sort((a, b) => a.date.localeCompare(b.date));
            if (merged.length === 0) throw new Error('No rows available after merge');

            fs.writeFileSync(BASELINE_CSV, toCsv(merged), 'utf8');

            const payload = {
              updated: new Date().toISOString(),
              source: {
                provider: 'stooq',
                symbol: 'CVX.US',
                url: sourceUrl || 'baseline-only',
                schedule: 'daily',
                baseline: 'cvx_us_d.csv'
              },
              data: merged
            };

            fs.writeFileSync(OUTPUT_JSON, JSON.stringify(payload), 'utf8');
            console.log(`Merged rows: ${merged.length}`);
            console.log(`Date range: ${merged[0].date} -> ${merged[merged.length - 1].date}`);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cvx_us_d.csv data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
