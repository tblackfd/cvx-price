name: Fetch CVX Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (keeps free-tier API usage well below daily limits)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CVX + AUD/USD data
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.ALPHA_VANTAGE_KEY;
          if (!API_KEY) throw new Error('Missing ALPHA_VANTAGE_KEY');
          const MIN_USD = 10;
          const MAX_USD = 1000;
          const MIN_FX = 0.4;
          const MAX_FX = 1.0;
          const RATE_LIMIT_PATTERN = /rate limit|premium endpoint|free API requests|requests per day|requests per second|spreading out/i;

          function getJson(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (!res.statusCode || res.statusCode < 200 || res.statusCode >= 300) {
                    return reject(new Error(`HTTP ${res.statusCode || 'unknown'} from Alpha Vantage`));
                  }
                  try {
                    const parsed = JSON.parse(data);
                    const note = parsed['Note'];
                    const apiError = parsed['Error Message'];
                    if (note || apiError) {
                      const details = `${apiError || note}${apiError && note ? ` | Note: ${note}` : ''}`;
                      const err = new Error(`API limit or error: ${details}`);
                      if (RATE_LIMIT_PATTERN.test(details)) {
                        err.code = 'ALPHA_VANTAGE_RATE_LIMIT';
                      }
                      throw err;
                    }
                    resolve(parsed);
                  } catch (e) {
                    const preview = data.slice(0, 120).replaceAll(API_KEY, '[REDACTED]');
                    const safeMessage = String(e.message || 'unknown').replaceAll(API_KEY, '[REDACTED]');
                    reject(new Error(`JSON parse error: ${safeMessage}. Body preview: ${preview}`));
                  }
                });
              }).on('error', reject);
            });
          }

          async function fetchCVX() {
            const isObject = (value) => value !== null && typeof value === 'object';

            const selectUSD = (v) => {
              const adjustedClose = Number(v['5. adjusted close']);
              if (Number.isFinite(adjustedClose) && adjustedClose > 0) return adjustedClose;

              const close = Number(v['4. close']);
              if (Number.isFinite(close) && close > 0) return close;

              return null;
            };

            const mapSeries = (series) => Object.entries(series)
              .map(([date, v]) => ({ date, usd: isObject(v) ? selectUSD(v) : null }))
              .filter(row => row.usd !== null);

            const dailyUrl = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=CVX&outputsize=compact&apikey=${API_KEY}`;
            const dailyJson = await getJson(dailyUrl);
            const dailySeries = dailyJson['Time Series (Daily)'];
            if (!dailySeries) {
              const dailyInfo = dailyJson['Information'];
              throw new Error(
                dailyInfo
                  ? `Missing CVX series from daily endpoint: ${dailyInfo}`
                  : 'Missing CVX series from daily endpoint'
              );
            }

            const rows = mapSeries(dailySeries);
            if (rows.length === 0) throw new Error('CVX series returned no valid price rows');
            return rows;
          }

          async function fetchFX() {
            const url = `https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=AUD&to_symbol=USD&outputsize=compact&apikey=${API_KEY}`;
            const json = await getJson(url);

            const series = json['Time Series FX (Daily)'];
            if (!series) {
              const info = json['Information'];
              throw new Error(info ? `Missing FX series: ${info}` : 'Missing FX series');
            }

            return Object.entries(series).map(([date, v]) => ({
              date,
              fx: Number(v['4. close'])
            }));
          }

          function loadExisting() {
            if (!fs.existsSync('data.json')) return [];

            try {
              const parsed = JSON.parse(fs.readFileSync('data.json', 'utf8'));
              if (!Array.isArray(parsed.data)) return [];
              return parsed.data;
            } catch {
              return [];
            }
          }

          function validateRow(row) {
            if (!row.date || typeof row.date !== 'string') return false;
            if (!Number.isFinite(row.usd) || row.usd <= 0) return false;
            if (!Number.isFinite(row.fx) || row.fx <= 0) return false;
            if (!Number.isFinite(row.aud) || row.aud <= 0) return false;

            // sanity bounds (prevents API corruption)
            if (row.usd < MIN_USD || row.usd > MAX_USD) return false;
            if (row.fx < MIN_FX || row.fx > MAX_FX) return false;

            return true;
          }

          function merge(existing, stock, fx) {
            const fxMap = new Map(fx.map(d => [d.date, d.fx]));
            const fxDates = fx.map(d => d.date).sort();

            function getFX(date) {
              if (fxMap.has(date)) return fxMap.get(date);
              let left = 0;
              let right = fxDates.length - 1;
              let match = null;
              while (left <= right) {
                const mid = left + Math.floor((right - left) / 2);
                if (fxDates[mid] <= date) {
                  match = fxDates[mid];
                  left = mid + 1;
                } else {
                  right = mid - 1;
                }
              }
              return match ? fxMap.get(match) : null;
            }

            const existingMap = new Map(existing.map(d => [d.date, d]));
            let added = 0;

            for (const s of stock) {
              if (existingMap.has(s.date)) continue;

              const fxRate = getFX(s.date);
              if (!fxRate) continue;

              const row = {
                date: s.date,
                usd: s.usd,
                aud: s.usd / fxRate,
                fx: fxRate
              };

              if (!validateRow(row)) {
                console.warn(`Skipping invalid row ${s.date}`);
                continue;
              }

              existingMap.set(s.date, row);
              added++;
            }

            const merged = Array.from(existingMap.values())
              .sort((a, b) => a.date.localeCompare(b.date));

            console.log(`Added ${added} new rows`);
            return merged;
          }

          async function main() {
            console.log('Loading existing data...');
            const existing = loadExisting();

            console.log(`Existing rows: ${existing.length}`);

            let stock;
            let fx;
            try {
              console.log('Fetching latest CVX...');
              stock = await fetchCVX();

              console.log('Fetching latest FX...');
              fx = await fetchFX();
            } catch (err) {
              if (err?.code === 'ALPHA_VANTAGE_RATE_LIMIT') {
                console.warn(`Alpha Vantage rate limit hit, keeping existing data unchanged: ${err.message}`);
                return;
              }
              throw err;
            }

            const merged = merge(existing, stock, fx);

            const output = {
              updated: new Date().toISOString(),
              data: merged
            };

            fs.writeFileSync('data.json', JSON.stringify(output));
            console.log(`Total rows: ${merged.length}`);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
