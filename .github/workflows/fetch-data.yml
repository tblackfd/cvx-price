name: Fetch CVX Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (keeps free-tier API usage well below daily limits)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CVX + AUD/USD data
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.ALPHA_VANTAGE_KEY;
          if (!API_KEY) throw new Error('Missing ALPHA_VANTAGE_KEY');
          const MIN_USD = 10;
          const MAX_USD = 1000;
          const MIN_FX = 0.4;
          const MAX_FX = 1.0;
          const REQUEST_TIMEOUT_MS = 30000;
          const RATE_LIMIT_PATTERN = /rate limit|premium endpoint|free API requests|requests per day|requests per second|spreading out/i;
          const TRANSIENT_NETWORK_PATTERN = /econnreset|etimedout|eai_again|enotfound|socket hang up|network/i;
          const RETRY_ATTEMPTS = 3;
          const RETRY_BASE_DELAY_MS = 1500;
 
          function redactSecrets(input) {
            return String(input || '').replaceAll(API_KEY, '[REDACTED]');
          }

          function isPlainObject(value) {
            return value !== null && typeof value === 'object' && !Array.isArray(value);
          }

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          function isRetryableAlphaVantageError(err) {
            return err?.code === 'ALPHA_VANTAGE_RATE_LIMIT' || err?.code === 'ALPHA_VANTAGE_TRANSIENT_NETWORK';
          }

          async function fetchWithRetry(label, fn) {
            let lastErr;
            for (let attempt = 1; attempt <= RETRY_ATTEMPTS; attempt++) {
              try {
                return await fn();
              } catch (err) {
                lastErr = err;
                if (!isRetryableAlphaVantageError(err) || attempt === RETRY_ATTEMPTS) break;
                const waitMs = RETRY_BASE_DELAY_MS * attempt;
                console.warn(`${label} attempt ${attempt} failed (${err.message}). Retrying in ${waitMs}ms...`);
                await sleep(waitMs);
              }
            }
            throw lastErr;
          }
 
          function getJson(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (!res.statusCode || res.statusCode < 200 || res.statusCode >= 300) {
                    return reject(new Error(`HTTP ${res.statusCode || 'unknown'} from Alpha Vantage`));
                  }

                  let parsed;
                  try {
                    parsed = JSON.parse(data);
                  } catch (e) {
                    const preview = redactSecrets(data.slice(0, 120));
                    const safeMessage = redactSecrets(e.message || 'unknown');
                    reject(new Error(`JSON parse error: ${safeMessage}. Body preview: ${preview}`));
                    return;
                  }

                  const note = parsed['Note'];
                  const info = parsed['Information'];
                  const apiError = parsed['Error Message'];
                  if (note || info || apiError) {
                    const errorFields = [apiError, info, note];
                    const details = redactSecrets(errorFields.filter(Boolean).join(' | '));
                    const err = new Error(`API error: ${details}`);
                    err.code = RATE_LIMIT_PATTERN.test(details)
                      ? 'ALPHA_VANTAGE_RATE_LIMIT'
                      : 'ALPHA_VANTAGE_API_ERROR';
                    reject(err);
                    return;
                  }

                  resolve(parsed);
                });
              });

              req.setTimeout(REQUEST_TIMEOUT_MS, () => {
                req.destroy(new Error(`Request timed out after ${REQUEST_TIMEOUT_MS}ms`));
              });
              req.on('error', (err) => {
                const wrapped = new Error(`Network error while fetching Alpha Vantage data: ${redactSecrets(err.message || err)}`);
                wrapped.code = TRANSIENT_NETWORK_PATTERN.test(String(err.message || ''))
                  ? 'ALPHA_VANTAGE_TRANSIENT_NETWORK'
                  : 'ALPHA_VANTAGE_NETWORK_ERROR';
                reject(wrapped);
              });
            });
          }

          async function fetchCVX() {
            const selectUSD = (v) => {
              const adjustedClose = Number(v['5. adjusted close']);
              if (Number.isFinite(adjustedClose) && adjustedClose > 0) return adjustedClose;

              const close = Number(v['4. close']);
              if (Number.isFinite(close) && close > 0) return close;

              return null;
            };

            const mapSeries = (series) => Object.entries(series)
              .map(([date, v]) => ({ date, usd: isPlainObject(v) ? selectUSD(v) : null }))
              .filter(row => row.usd !== null);

            const dailyUrl = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=CVX&outputsize=full&apikey=${API_KEY}`;
            const dailyJson = await getJson(dailyUrl);
            const dailySeries = dailyJson['Time Series (Daily)'] || dailyJson['Time Series (Daily) Adjusted'];
            if (!isPlainObject(dailySeries)) {
              const dailyInfo = dailyJson['Information'];
              throw new Error(
                dailyInfo
                  ? `Missing CVX series from daily-adjusted endpoint: ${dailyInfo}`
                  : 'Missing CVX series from daily-adjusted endpoint'
              );
            }

            const rows = mapSeries(dailySeries);
            if (rows.length === 0) throw new Error('CVX series returned no valid price rows');
            return rows;
          }

          async function fetchFX() {
            const url = `https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=AUD&to_symbol=USD&outputsize=full&apikey=${API_KEY}`;
            const json = await getJson(url);
 
            const series = json['Time Series FX (Daily)'];
            if (!isPlainObject(series)) {
              const info = json['Information'];
              throw new Error(info ? `Missing FX series: ${info}` : 'Missing FX series');
            }

            return Object.entries(series).map(([date, v]) => ({
              date,
              fx: Number(v['4. close'])
            }));
          }

          function loadExisting() {
            if (!fs.existsSync('data.json')) return [];

            try {
              const parsed = JSON.parse(fs.readFileSync('data.json', 'utf8'));
              if (!Array.isArray(parsed.data)) return [];

              const normalizeRow = (row) => {
                if (!row || typeof row.date !== 'string') return null;
                const usd = Number(row.usd);
                const fx = Number(row.fx);
                const aud = Number(row.aud);
                if (!Number.isFinite(usd) || usd <= 0) return null;
                if (!Number.isFinite(fx) || fx <= 0) return null;
                if (!Number.isFinite(aud) || aud <= 0) return null;
                return { date: row.date, usd, fx, aud };
              };

              return parsed.data
                .map(normalizeRow)
                .filter(Boolean);
            } catch {
              return [];
            }
          }

          function validateRow(row) {
            if (!row.date || typeof row.date !== 'string') return false;
            if (!Number.isFinite(row.usd) || row.usd <= 0) return false;
            if (!Number.isFinite(row.fx) || row.fx <= 0) return false;
            if (!Number.isFinite(row.aud) || row.aud <= 0) return false;

            // sanity bounds (prevents API corruption)
            if (row.usd < MIN_USD || row.usd > MAX_USD) return false;
            if (row.fx < MIN_FX || row.fx > MAX_FX) return false;

            return true;
          }

          function merge(existing, stock, fx) {
            const fxMap = new Map(fx.map(d => [d.date, d.fx]));
            const fxDates = fx.map(d => d.date).sort();

            function getFX(date) {
              if (fxMap.has(date)) return fxMap.get(date);
              let left = 0;
              let right = fxDates.length - 1;
              let match = null;
              while (left <= right) {
                const mid = left + Math.floor((right - left) / 2);
                if (fxDates[mid] <= date) {
                  match = fxDates[mid];
                  left = mid + 1;
                } else {
                  right = mid - 1;
                }
              }
              return match ? fxMap.get(match) : null;
            }

            const existingMap = new Map(existing.map(d => [d.date, d]));
            let added = 0;

            for (const s of stock) {
              if (existingMap.has(s.date)) continue;

              const fxRate = getFX(s.date);
              if (!fxRate) continue;

              const row = {
                date: s.date,
                usd: s.usd,
                aud: s.usd / fxRate,
                fx: fxRate
              };

              if (!validateRow(row)) {
                console.warn(`Skipping invalid row ${s.date}`);
                continue;
              }

              existingMap.set(s.date, row);
              added++;
            }

            const merged = Array.from(existingMap.values())
              .sort((a, b) => a.date.localeCompare(b.date));

            console.log(`Added ${added} new rows`);
            return merged;
          }

          async function main() {
            console.log('Loading existing data...');
            const existing = loadExisting();

            console.log(`Existing rows: ${existing.length}`);

            let stock;
            let fx;
            try {
              console.log('Fetching latest CVX...');
              stock = await fetchWithRetry('CVX', fetchCVX);

              // Space requests to respect Alpha Vantage free-tier burst limits.
              await sleep(1200);
              console.log('Fetching latest FX...');
              fx = await fetchWithRetry('FX', fetchFX);
            } catch (err) {
              if (isRetryableAlphaVantageError(err)) {
                if (existing.length === 0) {
                  throw new Error(`Temporary Alpha Vantage issue with no existing data to keep: ${err.message}`);
                }
                console.warn(`Temporary Alpha Vantage issue, keeping existing data unchanged: ${err.message}`);
                return;
              }
              throw err;
            }

            const merged = merge(existing, stock, fx);

            const output = {
              updated: new Date().toISOString(),
              data: merged
            };

            fs.writeFileSync('data.json', JSON.stringify(output));
            console.log(`Total rows: ${merged.length}`);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
