name: Update CVX Data

on:
  schedule:
    - cron: '30 0 * * *' # daily at 00:30 UTC (after NYSE close + Alpha Vantage update)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests pandas lxml

      - name: Scrape CVX dividend (Python)
        continue-on-error: true
        env:
          SOURCE_URL: https://chevroncorp.gcs-web.com/stock-information/dividend-history
          OUT_JSON: /tmp/dividend_scraped.json
          OUT_CSV: /tmp/dividend_scraped.csv
        run: |
          python <<'PY'
          import os
          import re
          import io
          import json
          import time
          import hashlib
          from datetime import datetime, timezone

          import requests
          import pandas as pd

          SOURCE_URL = os.environ["SOURCE_URL"]
          OUT_JSON = os.environ["OUT_JSON"]
          OUT_CSV = os.environ["OUT_CSV"]

          def fetch_with_retries(url, attempts=6, backoff=2.0):
              headers = {
                  "User-Agent": "github-actions-cvx-dividend-scraper/1.0",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              }
              last_exc = None
              for i in range(1, attempts + 1):
                  try:
                      return requests.get(url, headers=headers, timeout=30)
                  except Exception as e:
                      last_exc = e
                      time.sleep(backoff * i)
              raise RuntimeError(f"Failed to fetch {url}: {last_exc}")

          resp = fetch_with_retries(SOURCE_URL)
          status = resp.status_code
          html = resp.text or ""

          if status != 200 or len(html) < 500:
              raise RuntimeError(f"Unexpected HTTP status/content: {status}")

          html_sha256 = hashlib.sha256(
              html.encode("utf-8", errors="ignore")
          ).hexdigest()

          scraped_utc = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          tables = pd.read_html(io.StringIO(html))
          if not tables:
              raise RuntimeError("No HTML tables found")
          df = tables[0].dropna(how="all")
          DECLARED_COL = 0
          RECORD_COL = 1
          PAYABLE_COL = 2
          AMOUNT_COL = 3
          TYPE_COL = 4

          amount_re = re.compile(r"\$?\s*\d+(\.\d+)?")
          date_re = re.compile(r"\d{1,2}/\d{1,2}/\d{2,4}")

          def parse_date(s):
              ts = pd.to_datetime(s, errors="coerce")
              return ts.date().isoformat() if ts is not pd.NaT else None

          rows = []
          for _, r in df.iterrows():
              if amount_re.match(str(r.iloc[AMOUNT_COL])) and date_re.match(str(r.iloc[DECLARED_COL])):
                  rows.append(r)

          if not rows:
              raise RuntimeError("No dividend rows detected")

          latest = rows[0]

          out = {
              "ticker": "CVX",
              "declared_date": parse_date(latest.iloc[DECLARED_COL]),
              "record_date": parse_date(latest.iloc[RECORD_COL]),
              "payable_date": parse_date(latest.iloc[PAYABLE_COL]),
              "amount_per_share": float(
                  str(latest.iloc[AMOUNT_COL]).replace("$", "").strip()
              ),
              "currency": "USD",
              "type": latest.iloc[TYPE_COL] if TYPE_COL < len(latest) else None,
              "source": {
                  "url": SOURCE_URL,
                  "scraped_utc": scraped_utc,
                  "html_sha256": html_sha256,
              },
          }

          with open(OUT_JSON, "w") as f:
              json.dump(out, f, indent=2)

          df.to_csv(OUT_CSV, index=False)

          print(json.dumps(out, indent=2))
          PY

      - name: Fetch CVX + AUD/USD data and update baselines
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const zlib = require('zlib');
          const fs = require('fs');
          const path = require('path');

          const BASELINE_CVX_CSV = path.resolve('cvx_us_d.csv');
          const BASELINE_FX_CSV  = path.resolve('DEXUSAL.csv');
          const OUTPUT_JSON      = path.resolve('data.json');
          const GCS_WEB_DIVIDEND_URL = 'https://chevroncorp.gcs-web.com/stock-information/dividend-history';
          const HTTP_USER_AGENT = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';

          const API_KEY = process.env.ALPHA_VANTAGE_KEY;
          if (!API_KEY) throw new Error('Missing ALPHA_VANTAGE_KEY secret');

          const REQUEST_TIMEOUT_MS  = 30000;
          const GCS_REQUEST_TIMEOUT_MS = 90000;
          const RETRY_ATTEMPTS      = 5;
          const RETRY_BASE_DELAY_MS = 1500;
          const RETRY_JITTER_MS     = 500;
          const MIN_PLAUSIBLE_DIVIDEND = 0;
          const MAX_PLAUSIBLE_DIVIDEND = 10;
          const RATE_LIMIT_PATTERN  = /rate limit|premium endpoint|free API requests|requests per day|requests per second|spreading out/i;
          const TRANSIENT_PATTERN   = /econnreset|etimedout|eai_again|enotfound|socket hang up|network/i;

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
          function redact(s)  { return String(s || '').replaceAll(API_KEY, '[REDACTED]'); }
          function isObj(v)   { return v !== null && typeof v === 'object' && !Array.isArray(v); }
          function parseNum(v) { const n = Number(v); return Number.isFinite(n) ? n : null; }
          function parseCurrency(v) {
            if (v == null) return null;
            const cleaned = String(v).replace(/[$,\s]/g, '');
            const n = Number(cleaned);
            return Number.isFinite(n) ? n : null;
          }
          function isPlausibleDividendAmount(v) {
            return Number.isFinite(v) && v > MIN_PLAUSIBLE_DIVIDEND && v < MAX_PLAUSIBLE_DIVIDEND;
          }
          function previewText(v, max = 220) {
            return String(v || '').replace(/\s+/g, ' ').trim().slice(0, max);
          }
          function timingSummary(startedAt, marks = {}) {
            const end = marks.end || Date.now();
            const value = (k) => marks[k] ? `${marks[k] - startedAt}ms` : 'n/a';
            return `total=${end - startedAt}ms socket=${value('socket')} dns=${value('lookup')} tcp=${value('connect')} tls=${value('secureConnect')} ttfb=${value('response')} download=${marks.response ? `${end - marks.response}ms` : 'n/a'}`;
          }
          function normalizeDividendEvent(raw, source = null) {
            if (!isObj(raw)) return null;
            const amount = parseCurrency(raw.amount);
            const recordDate = normalizeDateToken(raw.record_date);
            const paymentDate = normalizeDateToken(raw.payment_date);
            const declaredDate = normalizeDateToken(raw.declared_date);
            if (!isPlausibleDividendAmount(amount)) return null;
            if (!validDate(recordDate) || !validDate(paymentDate) || paymentDate < recordDate) return null;
            const out = {
              amount,
              record_date: recordDate,
              payment_date: paymentDate
            };
            if (validDate(declaredDate)) out.declared_date = declaredDate;
            if (typeof raw.type === 'string' && raw.type.trim()) out.type = raw.type.trim();
            if (typeof raw.source === 'string' && raw.source.trim()) out.source = raw.source.trim();
            else if (typeof source === 'string' && source.trim()) out.source = source.trim();
            return out;
          }
          function dedupeAndSortDividendEvents(events) {
            const map = new Map();
            for (const e of events) {
              if (!e) continue;
              const key = `${e.record_date}|${e.payment_date}|${e.amount.toFixed(6)}|${e.declared_date || ''}|${(e.type || '').toLowerCase()}`;
              map.set(key, e);
            }
            return Array.from(map.values()).sort((a, b) => {
              if (a.payment_date !== b.payment_date) return a.payment_date.localeCompare(b.payment_date);
              if (a.record_date !== b.record_date) return a.record_date.localeCompare(b.record_date);
              return (a.declared_date || '').localeCompare(b.declared_date || '');
            });
          }

          function validDate(d) {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return false;
            const p = new Date(`${d}T00:00:00Z`);
            return !Number.isNaN(p.getTime()) && p.toISOString().slice(0, 10) === d;
          }
          function normalizeDateToken(raw) {
            const s = String(raw || '').trim();
            if (!s) return null;
            if (/^\d{4}-\d{2}-\d{2}$/.test(s) && validDate(s)) return s;
            const mdyyyy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (mdyyyy) {
              const mm = Number(mdyyyy[1]);
              const dd = Number(mdyyyy[2]);
              const yyyy = mdyyyy[3].length === 2 ? Number(`20${mdyyyy[3]}`) : Number(mdyyyy[3]);
              const iso = `${String(yyyy).padStart(4, '0')}-${String(mm).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
              return validDate(iso) ? iso : null;
            }
            const parsed = new Date(s);
            if (Number.isNaN(parsed.getTime())) return null;
            return parsed.toISOString().slice(0, 10);
          }
          function decodeHtmlEntities(s) {
            return String(s || '')
              .replace(/&nbsp;/gi, ' ')
              .replace(/&amp;/gi, '&')
              .replace(/&quot;/gi, '"')
              .replace(/&#39;|&apos;/gi, "'")
              .replace(/&lt;/gi, '<')
              .replace(/&gt;/gi, '>');
          }
          function extractDateCandidates(text) {
            const out = [];
            const patterns = [
              /\b\d{4}-\d{2}-\d{2}\b/g,
              /\b\d{1,2}\/\d{1,2}\/\d{2,4}\b/g,
              /\b(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:t(?:ember)?)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2},\s+\d{4}\b/gi
            ];
            for (const p of patterns) {
              p.lastIndex = 0;
              let m;
              while ((m = p.exec(text)) !== null) {
                const normalized = normalizeDateToken(m[0]);
                if (!validDate(normalized)) continue;
                out.push({ raw: m[0], normalized, index: m.index });
              }
            }
            out.sort((a, b) => a.index - b.index);
            return out;
          }
          function pickRecordAndPaymentDates(text) {
            const candidates = extractDateCandidates(text);
            if (candidates.length < 2) return null;
            const lower = text.toLowerCase();
            const dateNearKeyword = (keywordPattern) => {
              for (const c of candidates) {
                const start = Math.max(0, c.index - 40);
                const end = Math.min(text.length, c.index + c.raw.length + 40);
                const snippet = lower.slice(start, end);
                if (keywordPattern.test(snippet)) return c.normalized;
              }
              return null;
            };
            let record = dateNearKeyword(/\brecord\b/);
            let payment = dateNearKeyword(/\bpayment\b|\bpayable\b/);
            if (!record || !payment) {
              record = record || candidates[candidates.length - 2].normalized;
              payment = payment || candidates[candidates.length - 1].normalized;
            }
            if (!validDate(record) || !validDate(payment)) return null;
            if (payment < record) {
              const unique = Array.from(new Set(candidates.map(c => c.normalized))).sort((a, b) => a.localeCompare(b));
              if (unique.length < 2) return null;
              record = unique[unique.length - 2];
              payment = unique[unique.length - 1];
            }
            return payment >= record ? { record_date: record, payment_date: payment } : null;
          }
          function parseGcsWebDividendRows(html) {
            const visibleText = decodeHtmlEntities(
              String(html || '')
                .replace(/<script[\s\S]*?<\/script>/gi, ' ')
                .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                .replace(/<\/(?:tr|p|div|li|br|h[1-6]|table|section)>/gi, '\n')
                .replace(/<[^>]+>/g, ' ')
            )
              .replace(/\u00A0/g, ' ')
              .replace(/[ \t]+/g, ' ')
              .replace(/\s*\n\s*/g, '\n')
              .trim();
            const rows = [];
            const seen = new Set();
            const rowPattern = /(\d{1,2}\/\d{1,2}\/\d{2,4})\s+(\d{1,2}\/\d{1,2}\/\d{2,4})\s+(\d{1,2}\/\d{1,2}\/\d{2,4})\s+\$?\s*([0-9]+(?:\.[0-9]{1,3})?)\s+([A-Za-z][A-Za-z \/-]{1,30})/g;
            let m;
            while ((m = rowPattern.exec(visibleText)) !== null) {
              const declaredDate = normalizeDateToken(m[1]);
              const recordDate = normalizeDateToken(m[2]);
              const payableDate = normalizeDateToken(m[3]);
              const amount = parseCurrency(m[4]);
              const type = String(m[5] || '').trim();
              if (!isPlausibleDividendAmount(amount)) continue;
              if (!validDate(declaredDate) || !validDate(recordDate) || !validDate(payableDate)) continue;
              if (payableDate < recordDate) continue;
              if (!/\bcash\b|\bstock\b|\bspecial\b|\breturn\b/i.test(type)) continue;
              const key = `${declaredDate}|${recordDate}|${payableDate}|${amount}|${type.toLowerCase()}`;
              if (seen.has(key)) continue;
              seen.add(key);
              rows.push({
                declared_date: declaredDate,
                record_date: recordDate,
                payment_date: payableDate,
                amount,
                type
              });
            }
            return rows;
          }
          function parseLatestGcsWebDividend(html) {
            const rows = parseGcsWebDividendRows(html);
            if (rows.length === 0) return { rows, latest: null };
            rows.sort((a, b) => {
              if (a.payment_date !== b.payment_date) return a.payment_date.localeCompare(b.payment_date);
              if (a.record_date !== b.record_date) return a.record_date.localeCompare(b.record_date);
              return a.declared_date.localeCompare(b.declared_date);
            });
            return { rows, latest: rows[rows.length - 1] };
          }
          function getExistingDividendState() {
            if (!fs.existsSync(OUTPUT_JSON)) return { latestDividend: null, dividends: [] };
            try {
              const existing = JSON.parse(fs.readFileSync(OUTPUT_JSON, 'utf8'));
              const latestDividend = normalizeDividendEvent(existing?.latest_dividend, 'previous');
              const dividends = dedupeAndSortDividendEvents(
                (Array.isArray(existing?.dividends) ? existing.dividends : [])
                  .map(d => normalizeDividendEvent(d, d?.source || 'previous'))
              );
              return {
                latestDividend: latestDividend || (dividends.length ? dividends[dividends.length - 1] : null),
                dividends
              };
            } catch {
              return { latestDividend: null, dividends: [] };
            }
          }

          // ── CSV parsers ──────────────────────────────────────────────

          function parseCvxCsv(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            if (lines.length < 2) return [];
            const h = lines[0].split(',');
            const i = {
              date: h.indexOf('Date'), open: h.indexOf('Open'), high: h.indexOf('High'),
              low: h.indexOf('Low'), close: h.indexOf('Close'), volume: h.indexOf('Volume')
            };
            // Dividend column is optional for backward compatibility with existing baseline CSV snapshots.
            if ([i.date, i.open, i.high, i.low, i.close, i.volume].some(x => x < 0)) {
              throw new Error('cvx_us_d.csv missing required columns');
            }
            const rows = [];
            for (const line of lines.slice(1)) {
              const c = line.split(',');
              const date = c[i.date];
              const open = parseNum(c[i.open]), high = parseNum(c[i.high]);
              const low = parseNum(c[i.low]), close = parseNum(c[i.close]);
              const volume = parseNum(c[i.volume]);
              if (!date || !validDate(date)) continue;
              if (![open, high, low, close].every(v => Number.isFinite(v) && v > 0)) continue;
              if (!Number.isFinite(volume) || volume <= 0) continue;
              rows.push({ date, open, high, low, close, volume });
            }
            return rows;
          }

          // Parses DEXUSAL.csv (FRED format: observation_date,DEXUSAL)
          // Blank value rows (US holidays) are silently skipped.
          function parseFxCsv(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            if (lines.length < 2) return [];
            const rows = [];
            for (const line of lines.slice(1)) {
              const [rawDate, rawVal] = line.split(',');
              const date = (rawDate || '').trim();
              const val  = (rawVal  || '').trim();
              if (!date || !validDate(date) || !val) continue;
              const fx = parseNum(val);
              if (!Number.isFinite(fx) || fx <= 0) continue;
              rows.push({ date, fx });
            }
            return rows;
          }

          function toCvxCsv(rows) {
            return 'Date,Open,High,Low,Close,Volume\n' +
              rows.map(r => `${r.date},${r.open},${r.high},${r.low},${r.close},${r.volume}`).join('\n') + '\n';
          }

          function toFxCsv(rows) {
            return 'observation_date,DEXUSAL\n' +
              rows.map(r => `${r.date},${r.fx}`).join('\n') + '\n';
          }

          // ── Alpha Vantage JSON fetch ──────────────────────────────────

          function getJson(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (!res.statusCode || res.statusCode < 200 || res.statusCode >= 300) {
                    return reject(new Error(`HTTP ${res.statusCode}`));
                  }
                  let parsed;
                  try { parsed = JSON.parse(data); } catch (e) {
                    reject(new Error(`JSON parse error: ${redact(e.message)}. Preview: ${redact(data.slice(0, 120))}`));
                    return;
                  }
                  const details = redact([parsed['Error Message'], parsed['Information'], parsed['Note']].filter(Boolean).join(' | '));
                  if (details) {
                    const err = new Error(`API error: ${details}`);
                    err.code = RATE_LIMIT_PATTERN.test(details) ? 'ALPHA_VANTAGE_RATE_LIMIT' : 'ALPHA_VANTAGE_API_ERROR';
                    return reject(err);
                  }
                  resolve(parsed);
                });
              });
              req.setTimeout(REQUEST_TIMEOUT_MS, () => req.destroy(new Error('Request timeout')));
              req.on('error', e => {
                const err = new Error(`Network error: ${redact(e.message)}`);
                err.code = TRANSIENT_PATTERN.test(String(e.message)) ? 'ALPHA_VANTAGE_TRANSIENT_NETWORK' : 'ALPHA_VANTAGE_NETWORK_ERROR';
                reject(err);
              });
            });
          }
          function getText(url, { redirects = 0, timeoutMs = REQUEST_TIMEOUT_MS, logLabel = 'GET_TEXT' } = {}) {
            return new Promise((resolve, reject) => {
              if (redirects > 5) return reject(new Error('Too many redirects'));
              const startedAt = Date.now();
              const marks = {};
              const req = https.get(url, { headers: {
                'User-Agent': HTTP_USER_AGENT,
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.9',
                'Referer': 'https://www.google.com/',
                'Connection': 'keep-alive'
              } }, res => {
                if (!res.statusCode) return reject(new Error('Missing HTTP status code'));
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  const redirected = new URL(res.headers.location, url).toString();
                  res.resume();
                  console.log(`${logLabel} redirect ${url} -> ${redirected}`);
                  return resolve(getText(redirected, { redirects: redirects + 1, timeoutMs, logLabel }));
                }
                marks.response = Date.now();
                if (res.statusCode < 200 || res.statusCode >= 300) {
                  let body = '';
                  res.on('data', c => { if (body.length < 300) body += c.toString(); });
                  res.on('end', () => {
                    marks.end = Date.now();
                    const diagKeys = ['server', 'via', 'cf-ray', 'x-akamai-session-id', 'x-cache', 'set-cookie'];
                    const diagHeaders = Object.fromEntries(diagKeys.map(h => [h, res.headers[h]]).filter(([, v]) => v !== undefined));
                    console.warn(`${logLabel} HTTP ${res.statusCode} ${url} timing=${timingSummary(startedAt, marks)} diag_headers=${JSON.stringify(diagHeaders)} body_preview=${previewText(body, 200)}`);
                    reject(new Error(`HTTP ${res.statusCode}`));
                  });
                  return;
                }
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  marks.end = Date.now();
                  console.log(`${logLabel} success ${url} timing=${timingSummary(startedAt, marks)} bytes=${Buffer.byteLength(data, 'utf8')}`);
                  resolve(data);
                });
              });
              req.on('socket', socket => {
                marks.socket = Date.now();
                socket.on('lookup', () => { if (!marks.lookup) marks.lookup = Date.now(); });
                socket.on('connect', () => { if (!marks.connect) marks.connect = Date.now(); });
                socket.on('secureConnect', () => { if (!marks.secureConnect) marks.secureConnect = Date.now(); });
              });
              req.setTimeout(timeoutMs, () => {
                const stage = marks.response ? 'response_download' : (marks.secureConnect ? 'waiting_ttfb' : (marks.connect ? 'tls_handshake' : (marks.lookup ? 'tcp_connect' : 'dns_or_connect')));
                req.destroy(new Error(`Request timeout after ${timeoutMs}ms during ${stage}`));
              });
              req.on('error', e => {
                marks.end = Date.now();
                const err = new Error(`Network error: ${redact(e.message)}`);
                err.code = TRANSIENT_PATTERN.test(String(e.message)) ? 'CHEVRON_TRANSIENT_NETWORK' : 'CHEVRON_NETWORK_ERROR';
                console.warn(`${logLabel} error ${url} timing=${timingSummary(startedAt, marks)} message=${err.message}`);
                reject(err);
              });
            });
          }

          function isRetryable(e) {
            return e?.code === 'ALPHA_VANTAGE_RATE_LIMIT' ||
              e?.code === 'ALPHA_VANTAGE_TRANSIENT_NETWORK' ||
              e?.code === 'CHEVRON_TRANSIENT_NETWORK' ||
              e?.code === 'NASDAQ_TRANSIENT_NETWORK';
          }

          async function withRetry(label, fn) {
            let last;
            for (let a = 1; a <= RETRY_ATTEMPTS; a++) {
              try { return await fn(); } catch (e) {
                last = e;
                if (!isRetryable(e) || a === RETRY_ATTEMPTS) break;
                const wait = Math.floor((RETRY_BASE_DELAY_MS * (2 ** (a - 1))) + (Math.random() * RETRY_JITTER_MS));
                console.warn(`${label} attempt ${a} failed (${e.message}). Retrying in ${wait}ms…`);
                await sleep(wait);
              }
            }
            throw last;
          }

          // outputsize=compact gives last ~100 trading days — sufficient for daily
          // incremental updates against the CSV baselines.
          async function fetchCvxRows() {
            const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=CVX&outputsize=compact&apikey=${API_KEY}`;
            const json = await getJson(url);
            const series = json['Time Series (Daily)'];
            if (!isObj(series)) throw new Error(`Missing CVX time series${json['Information'] ? ': ' + redact(json['Information']) : ''}`);
            return Object.entries(series).flatMap(([date, v]) => {
              if (!isObj(v) || !validDate(date)) return [];
              const close = Number(v['4. close']);
              const open = Number(v['1. open']), high = Number(v['2. high']);
              const low  = Number(v['3. low']),  volume = Number(v['5. volume']);
              if (![open, high, low, close].every(x => Number.isFinite(x) && x > 0)) return [];
              if (!Number.isFinite(volume) || volume <= 0) return [];
              return [{ date, open, high, low, close, volume }];
            });
          }

          async function fetchFxRows() {
            const url = `https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=AUD&to_symbol=USD&outputsize=compact&apikey=${API_KEY}`;
            const json = await getJson(url);
            const series = json['Time Series FX (Daily)'];
            if (!isObj(series)) throw new Error(`Missing FX time series${json['Information'] ? ': ' + redact(json['Information']) : ''}`);
            return Object.entries(series).flatMap(([date, v]) => {
              if (!isObj(v) || !validDate(date)) return [];
              const fx = Number(v['4. close']);
              if (!Number.isFinite(fx) || fx <= 0) return [];
              return [{ date, fx }];
            });
          }
          async function fetchLatestGcsWebDividend() {
            const html = await getText(GCS_WEB_DIVIDEND_URL, { timeoutMs: GCS_REQUEST_TIMEOUT_MS, logLabel: 'GCS_WEB_DIVIDEND' });
            const parsed = parseLatestGcsWebDividend(html);
            if (!parsed.latest) throw new Error('Could not parse latest dividend from GCS-web page');
            console.log(`GCS-web parsed ${parsed.rows.length} dividend rows`);
            return parsed;
          }

          async function fetchNasdaqDividend() {
            const NASDAQ_CVX_URL = 'https://api.nasdaq.com/api/quote/CVX/dividends?assetclass=stocks';
            const response = await new Promise((resolve, reject) => {
              const startedAt = Date.now();
              const marks = {};
              const req = https.get(NASDAQ_CVX_URL, { headers: {
                'User-Agent': HTTP_USER_AGENT,
                'Accept': 'application/json, text/plain, */*',
                'Accept-Language': 'en-US,en;q=0.9',
                'Accept-Encoding': 'gzip, deflate, br',
                'Origin': 'https://www.nasdaq.com',
                'Referer': 'https://www.nasdaq.com/',
                'Connection': 'keep-alive'
              } }, res => {
                marks.response = Date.now();
                const chunks = [];
                res.on('data', c => chunks.push(Buffer.isBuffer(c) ? c : Buffer.from(c)));
                res.on('end', () => {
                  marks.end = Date.now();
                  let bodyBuffer = Buffer.concat(chunks);
                  const encoding = String(res.headers['content-encoding'] || '').toLowerCase();
                  try {
                    if (encoding.includes('br')) bodyBuffer = zlib.brotliDecompressSync(bodyBuffer);
                    else if (encoding.includes('gzip')) bodyBuffer = zlib.gunzipSync(bodyBuffer);
                    else if (encoding.includes('deflate')) bodyBuffer = zlib.inflateSync(bodyBuffer);
                  } catch (decompressErr) {
                    return reject(new Error(`NASDAQ decompress error (${encoding || 'identity'}): ${decompressErr.message}`));
                  }
                  const bodyText = bodyBuffer.toString('utf8');
                  const status = Number(res.statusCode || 0);
                  const contentType = String(res.headers['content-type'] || '');
                  console.log(`NASDAQ_DIVIDEND response status=${status} content_type=${contentType || 'n/a'} content_encoding=${encoding || 'identity'} timing=${timingSummary(startedAt, marks)} bytes=${bodyBuffer.length}`);
                  if (!status || status < 200 || status >= 300) {
                    return reject(new Error(`HTTP ${status} content_type=${contentType || 'n/a'} body_preview=${previewText(bodyText)}`));
                  }
                  resolve({ jsonText: bodyText, status, contentType });
                });
              });
              req.on('socket', socket => {
                marks.socket = Date.now();
                socket.on('lookup', () => { if (!marks.lookup) marks.lookup = Date.now(); });
                socket.on('connect', () => { if (!marks.connect) marks.connect = Date.now(); });
                socket.on('secureConnect', () => { if (!marks.secureConnect) marks.secureConnect = Date.now(); });
              });
              req.setTimeout(REQUEST_TIMEOUT_MS, () => req.destroy(new Error(`Request timeout after ${REQUEST_TIMEOUT_MS}ms`)));
              req.on('error', e => {
                marks.end = Date.now();
                const err = new Error(`Network error: ${e.message}`);
                err.code = TRANSIENT_PATTERN.test(String(e.message)) ? 'NASDAQ_TRANSIENT_NETWORK' : 'NASDAQ_NETWORK_ERROR';
                console.warn(`NASDAQ_DIVIDEND error timing=${timingSummary(startedAt, marks)} message=${err.message}`);
                reject(err);
              });
            });
            let json;
            try {
              json = JSON.parse(response.jsonText);
            } catch (e) {
              throw new Error(`NASDAQ JSON parse error: ${e.message}. status=${response.status} content_type=${response.contentType || 'n/a'} body_preview=${previewText(response.jsonText)}`);
            }
            const rows = json?.data?.dividends?.rows;
            if (!Array.isArray(rows) || rows.length === 0) {
              console.warn(`NASDAQ_DIVIDEND empty rows status=${response.status} content_type=${response.contentType || 'n/a'} body_preview=${previewText(response.jsonText)}`);
              throw new Error(`No NASDAQ dividend rows (status=${response.status})`);
            }
            const parsedRows = [];
            for (let i = 0; i < rows.length; i++) {
              const row = rows[i] || {};
              const amount = parseCurrency(row.amount);
              const paymentDate = normalizeDateToken(row.paymentDate);
              const recordDate = normalizeDateToken(row.recordDate);
              const declaredDate = normalizeDateToken(row.declarationDate || row.declaredDate);
              const exDate = normalizeDateToken(row.exDivDate || row.exDate || row.exDividendDate);
              if (!isPlausibleDividendAmount(amount)) continue;
              const selectedDate = paymentDate || recordDate || declaredDate || exDate;
              if (!validDate(selectedDate)) continue;
              const normalizedRecordDate = recordDate || declaredDate || exDate || selectedDate;
              const normalizedPaymentDate = paymentDate || recordDate || declaredDate || exDate || selectedDate;
              if (!validDate(normalizedRecordDate) || !validDate(normalizedPaymentDate)) continue;
              const dateSource = paymentDate
                ? 'paymentDate'
                : (recordDate ? 'recordDate' : (declaredDate ? 'declaredDate' : 'exDate'));
              parsedRows.push({
                row_index: i,
                amount,
                declared_date: declaredDate || null,
                record_date: normalizedRecordDate,
                payment_date: normalizedPaymentDate,
                selected_date: selectedDate,
                selected_date_source: dateSource,
                raw_payment_date: paymentDate || null,
                source: 'nasdaq'
              });
            }
            if (parsedRows.length === 0) throw new Error('Could not parse NASDAQ dividend rows');
            parsedRows.sort((a, b) => {
              if (a.selected_date !== b.selected_date) return a.selected_date.localeCompare(b.selected_date);
              if (a.payment_date !== b.payment_date) return a.payment_date.localeCompare(b.payment_date);
              return a.row_index - b.row_index;
            });
            const selected = parsedRows[parsedRows.length - 1];
            const paymentRows = parsedRows.filter(r => r.raw_payment_date);
            if (paymentRows.length > 0) {
              const maxPaymentDate = paymentRows.reduce((max, r) => r.raw_payment_date > max ? r.raw_payment_date : max, paymentRows[0].raw_payment_date);
              if (selected.raw_payment_date !== maxPaymentDate) {
                console.warn(`NASDAQ self-check: selected row does not have the max payment date among parsed rows (selected=${selected.raw_payment_date || 'n/a'}, max=${maxPaymentDate})`);
              } else {
                console.log(`NASDAQ self-check passed: selected row has max payment date ${maxPaymentDate}`);
              }
            } else {
              console.warn('NASDAQ self-check: no rows had paymentDate; selected latest row using record/declared/exDate fallback');
            }
            return { latest: selected, rows: parsedRows };
          }

          // ── Merge + join helpers ──────────────────────────────────────

          function mergeByDate(base, updates) {
            const map = new Map(base.map(r => [r.date, r]));
            for (const r of updates) map.set(r.date, r);
            return Array.from(map.values()).sort((a, b) => a.date.localeCompare(b.date));
          }

          // Join CVX and FX on date.  For trading days where FX has no entry
          // (e.g. US federal holidays on which AUD markets still traded), carry
          // forward the most-recent prior FX close.
          function buildOutput(cvxRows, fxRows) {
            const fxMap   = new Map(fxRows.map(r => [r.date, r.fx]));
            const fxDates = fxRows.map(r => r.date); // ascending

            function lookupFx(date) {
              if (fxMap.has(date)) return fxMap.get(date);
              let lo = 0, hi = fxDates.length - 1, match = null;
              while (lo <= hi) {
                const mid = lo + Math.floor((hi - lo) / 2);
                if (fxDates[mid] <= date) { match = fxDates[mid]; lo = mid + 1; }
                else { hi = mid - 1; }
              }
              return match ? fxMap.get(match) : null;
            }

            const result = [];
            for (const row of cvxRows) {
              const fx = lookupFx(row.date);
              if (fx == null) continue; // no FX coverage yet (pre-1999 dates)
              result.push({
                date: row.date,
                open: row.open, high: row.high, low: row.low,
                close: row.close, volume: row.volume,
                fx,
                aud_close: row.close / fx
              });
            }
            return result;
          }

          // ── Main ──────────────────────────────────────────────────────

          async function main() {
            if (!fs.existsSync(BASELINE_CVX_CSV)) throw new Error('Missing cvx_us_d.csv');
            if (!fs.existsSync(BASELINE_FX_CSV))  throw new Error('Missing DEXUSAL.csv');

            const baseCvx = parseCvxCsv(fs.readFileSync(BASELINE_CVX_CSV, 'utf8'));
            const baseFx  = parseFxCsv(fs.readFileSync(BASELINE_FX_CSV,  'utf8'));
            const existingDividendState = getExistingDividendState();
            console.log(`Baseline CVX: ${baseCvx.length} rows, FX: ${baseFx.length} rows`);

            let newCvx = [], newFx = [];
            try {
              newCvx = await withRetry('CVX', fetchCvxRows);
              console.log(`Fetched ${newCvx.length} CVX rows from Alpha Vantage`);
              await sleep(12000); // 12s gap — AV free tier: max 5 calls/min
              newFx = await withRetry('FX', fetchFxRows);
              console.log(`Fetched ${newFx.length} FX rows from Alpha Vantage`);
            } catch (err) {
              if (isRetryable(err)) {
                if (baseCvx.length === 0 || baseFx.length === 0) {
                  throw new Error(`Alpha Vantage issue with empty baseline data: ${err.message}`);
                }
                console.warn(`Alpha Vantage issue, keeping baseline data: ${err.message}`);
              } else {
                throw err;
              }
            }

            const mergedCvx = mergeByDate(baseCvx, newCvx);
            const mergedFx  = mergeByDate(baseFx,  newFx);
            console.log(`Merged CVX: ${mergedCvx.length} rows, FX: ${mergedFx.length} rows`);

            fs.writeFileSync(BASELINE_CVX_CSV, toCvxCsv(mergedCvx), 'utf8');
            fs.writeFileSync(BASELINE_FX_CSV,  toFxCsv(mergedFx),  'utf8');

            const data = buildOutput(mergedCvx, mergedFx);
            if (data.length === 0) throw new Error('No output rows after joining CVX and FX data');
            let latestDividend = existingDividendState.latestDividend;
            let dividends = existingDividendState.dividends;
            let latestDividendSource = latestDividend ? 'previous' : 'none';
            let dividendFetchFailed = false;

            // ── Primary: use Python-scraped dividend if available ─────────
            const PYTHON_SCRAPED_JSON = '/tmp/dividend_scraped.json';
            if (fs.existsSync(PYTHON_SCRAPED_JSON)) {
              try {
                const scraped = JSON.parse(fs.readFileSync(PYTHON_SCRAPED_JSON, 'utf8'));
                const candidate = normalizeDividendEvent({
                  amount: scraped.amount_per_share,
                  record_date: scraped.record_date,
                  payment_date: scraped.payable_date,
                  declared_date: scraped.declared_date,
                  type: scraped.type,
                  source: 'python-gcs-web'
                }, 'python-gcs-web');
                if (candidate) {
                  latestDividend = candidate;
                  dividends = dedupeAndSortDividendEvents([candidate, ...dividends]);
                  latestDividendSource = 'python-gcs-web';
                  console.log(`Dividend source=python-gcs-web amount=$${latestDividend.amount} record=${latestDividend.record_date} payment=${latestDividend.payment_date} declared=${latestDividend.declared_date || 'n/a'}`);
                } else {
                  console.warn('Python-scraped dividend failed normalization, falling through to NASDAQ');
                }
              } catch (pyErr) {
                console.warn(`Failed to read/parse ${PYTHON_SCRAPED_JSON}: ${pyErr.message}. Falling through to NASDAQ`);
              }
            }

            // ── Fallback: NASDAQ API (only if Python scraper did not succeed) ──
            if (latestDividendSource !== 'python-gcs-web') {
              try {
                const nasdaqResult = await withRetry('NASDAQ_DIVIDEND', fetchNasdaqDividend);
                dividends = dedupeAndSortDividendEvents(nasdaqResult.rows.map(r => normalizeDividendEvent(r, 'nasdaq')));
                latestDividend = normalizeDividendEvent(nasdaqResult.latest, 'nasdaq');
                latestDividendSource = 'nasdaq';
                console.log(`Dividend source=NASDAQ row=${nasdaqResult.latest.row_index} selected_date=${nasdaqResult.latest.selected_date} selected_by=${nasdaqResult.latest.selected_date_source} amount=$${latestDividend.amount} record=${latestDividend.record_date} payment=${latestDividend.payment_date} rows=${dividends.length}`);
              } catch (err2) {
                dividendFetchFailed = true;
                if (latestDividend) {
                  latestDividendSource = 'previous';
                  console.warn(`NASDAQ fallback also failed (${err2.message}), keeping previous latest_dividend metadata`);
                } else {
                  latestDividendSource = 'none';
                  console.warn(`All dividend sources failed (${err2.message}), setting latest_dividend to null`);
                  latestDividend = null;
                  dividends = [];
                }
              }
            }
            if (!latestDividend && dividends.length > 0) latestDividend = dividends[dividends.length - 1];
            if (latestDividend) {
              const payDays = Math.floor((Date.now() - new Date(`${latestDividend.payment_date}T00:00:00Z`).getTime()) / 86400000);
              if (payDays > 120) console.warn(`Dividend metadata may be stale: payment_date=${latestDividend.payment_date} is ${payDays} days old`);
              if (dividendFetchFailed && payDays > 90) console.warn(`Dividend fetch failed and fallback latest_dividend is stale (${payDays} days old).`);
              console.log(`Dividend final source=${latestDividendSource} amount=$${latestDividend.amount} record=${latestDividend.record_date} payment=${latestDividend.payment_date}`);
            } else {
              console.log(`Dividend final source=${latestDividendSource} latest_dividend=null`);
            }

            const first = data[0], last = data[data.length - 1];
            console.log(`Output: ${data.length} rows, range: ${first.date} → ${last.date}`);
            console.log(`Latest: close=${last.close} USD, fx=${last.fx} AUD/USD, aud_close=${last.aud_close.toFixed(2)} AUD`);

            fs.writeFileSync(OUTPUT_JSON, JSON.stringify({
              schema_version: 2,
              updated: new Date().toISOString(),
              source: {
                provider: 'alphavantage',
                cvx_function: 'TIME_SERIES_DAILY',
                fx_function: 'FX_DAILY',
                cvx_symbol: 'CVX',
                fx_pair: 'AUD/USD',
                schedule: 'daily',
                baseline_cvx: 'cvx_us_d.csv',
                baseline_fx: 'DEXUSAL.csv',
                dividend_source_url: GCS_WEB_DIVIDEND_URL,
                dividend_fallback_source_url: 'https://api.nasdaq.com/api/quote/CVX/dividends?assetclass=stocks',
                dividend_source: latestDividendSource
              },
              latest_dividend: latestDividend ? {
                amount: latestDividend.amount,
                record_date: latestDividend.record_date,
                payment_date: latestDividend.payment_date,
                ...(latestDividend.declared_date ? { declared_date: latestDividend.declared_date } : {}),
                ...(latestDividend.type ? { type: latestDividend.type } : {})
              } : null,
              dividends,
              data
            }), 'utf8');
            console.log('data.json written');
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cvx_us_d.csv DEXUSAL.csv data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
