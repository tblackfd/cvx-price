name: Fetch CVX Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CVX + AUD/USD data
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.ALPHA_VANTAGE_KEY;
          if (!API_KEY) throw new Error('Missing ALPHA_VANTAGE_KEY');

          function getJson(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    if (parsed['Note'] || parsed['Error Message']) {
                      throw new Error('API limit or error: ' + JSON.stringify(parsed).slice(0, 200));
                    }
                    resolve(parsed);
                  } catch (e) {
                    reject(new Error('JSON parse/API error: ' + data.slice(0, 200)));
                  }
                });
              }).on('error', reject);
            });
          }

          async function fetchCVX() {
            const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=CVX&outputsize=compact&apikey=${API_KEY}`;
            const json = await getJson(url);

            const series = json['Time Series (Daily)'];
            if (!series) throw new Error('Missing CVX series');

            return Object.entries(series).map(([date, v]) => ({
              date,
              usd: Number(v['5. adjusted close']) // better long-term metric
            }));
          }

          async function fetchFX() {
            const url = `https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=AUD&to_symbol=USD&outputsize=compact&apikey=${API_KEY}`;
            const json = await getJson(url);

            const series = json['Time Series FX (Daily)'];
            if (!series) throw new Error('Missing FX series');

            return Object.entries(series).map(([date, v]) => ({
              date,
              fx: Number(v['4. close'])
            }));
          }

          function loadExisting() {
            if (!fs.existsSync('data.json')) return [];

            try {
              const parsed = JSON.parse(fs.readFileSync('data.json', 'utf8'));
              if (!Array.isArray(parsed.data)) return [];
              return parsed.data;
            } catch {
              return [];
            }
          }

          function validateRow(row) {
            if (!row.date || typeof row.date !== 'string') return false;
            if (!Number.isFinite(row.usd) || row.usd <= 0) return false;
            if (!Number.isFinite(row.fx) || row.fx <= 0) return false;
            if (!Number.isFinite(row.aud) || row.aud <= 0) return false;

            // sanity bounds (prevents API corruption)
            if (row.usd < 10 || row.usd > 1000) return false;
            if (row.fx < 0.4 || row.fx > 1.0) return false;

            return true;
          }

          function merge(existing, stock, fx) {
            const fxMap = new Map(fx.map(d => [d.date, d.fx]));
            const fxDates = fx.map(d => d.date).sort();

            function getFX(date) {
              if (fxMap.has(date)) return fxMap.get(date);
              const prev = fxDates.filter(d => d <= date);
              return prev.length ? fxMap.get(prev[prev.length - 1]) : null;
            }

            const existingMap = new Map(existing.map(d => [d.date, d]));
            let added = 0;

            for (const s of stock) {
              if (existingMap.has(s.date)) continue;

              const fxRate = getFX(s.date);
              if (!fxRate) continue;

              const row = {
                date: s.date,
                usd: s.usd,
                aud: s.usd / fxRate,
                fx: fxRate
              };

              if (!validateRow(row)) {
                console.warn(`Skipping invalid row ${s.date}`);
                continue;
              }

              existingMap.set(s.date, row);
              added++;
            }

            const merged = Array.from(existingMap.values())
              .sort((a, b) => a.date.localeCompare(b.date));

            console.log(`Added ${added} new rows`);
            return merged;
          }

          async function main() {
            console.log('Loading existing data...');
            const existing = loadExisting();

            console.log(`Existing rows: ${existing.length}`);

            console.log('Fetching latest CVX...');
            const stock = await fetchCVX();

            console.log('Fetching latest FX...');
            const fx = await fetchFX();

            const merged = merge(existing, stock, fx);

            const output = {
              updated: new Date().toISOString(),
              data: merged
            };

            fs.writeFileSync('data.json', JSON.stringify(output));
            console.log(`Total rows: ${merged.length}`);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update CVX data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
